<div class="ticker-panel">

{% for group in tickers|groupby("index") %}
<div class="index-group mb-3">
    <h6 class="index-title">{{ group.grouper }}</h6>
    <div class="ticker-grid">
        {% for t in group.list %}
        <div class="ticker-box 
            {% if t.pct is not none and t.pct <= -10 %} blink
            {% elif t.pct is not none and t.pct > 0 %} up
            {% elif t.pct is not none and t.pct < 0 %} down
            {% endif %}">
            
            <div class="ticker-symbol">{{ t.ticker }}</div>
            <div class="ticker-price">{{ t.price or '–' }}</div>
            <span class="ticker-pct 
                {% if t.pct is not none and t.pct <= -10 %}blink
                {% elif t.pct is not none and t.pct < 0 %}neg
                {% else %}pos{% endif %}">
                {{ "+" if t.pct and t.pct > 0 else "" }}
                {{ "%.2f"|format(t.pct) if t.pct is not none else "–" }}%
            </span>
        </div>
        {% endfor %}
    </div>
</div>
{% endfor %}

</div>
